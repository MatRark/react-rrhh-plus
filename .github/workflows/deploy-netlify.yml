name: Deploy Frontend to Netlify (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify (prod)
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: ./dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: "Smoke test (SPA: /login)"
        env:
          URL: https://rhplusgang2.netlify.app/
        run: |
          echo "Checking $URL/login ..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /tmp/page.html -w "%{http_code}" "$URL/login")
            echo "Attempt $i -> HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "Not 200 on $URL/login"
            exit 1
          fi

          if ! grep -qi 'id="root"' /tmp/page.html && ! grep -qi '<title>' /tmp/page.html; then
            echo "Index markers not found"
            head -n 40 /tmp/page.html
            exit 1
          fi

          echo "Smoke test OK"
